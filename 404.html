<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stránka nenalezena | Procvič si angličtinu</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎓%3C/text%3E%3C/svg%3E">
</head>

<body>
    <div class="app" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; box-sizing: border-box;">
        <div class="container" style="max-width: 600px; display: flex; flex-direction: column; align-items: center;">
            <div style="font-size: 6rem; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));">🔍</div>
            <h1 class="hero-title" style="font-size: 3.5rem; margin-bottom: 16px; font-weight: 800;">
                <span class="gradient-text">404</span>
            </h1>
            <h2 style="font-size: 1.8rem; font-weight: 600; margin-bottom: 16px; color: var(--text-primary);">Stránka nenalezena</h2>
            <p class="hero-description" style="margin-bottom: 32px; max-width: 100%; color: var(--text-secondary); line-height: 1.6;">
                Omlouváme se, ale požadovaná stránka neexistuje nebo byla přesunuta.
            </p>
            <a href="/" class="btn btn-primary" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none; padding: 14px 28px; border-radius: 8px; font-weight: 500; box-shadow: var(--shadow-md);">
                ⬅️ Zpět na cvičení
            </a>
        </div>
    </div>
</body>

</html>
