<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark slate background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Indigo/purple glowing radial gradients -->
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Stylized logo / badge -->
  <g transform="translate(600, 160)">
    <circle r="60" fill="#1e293b" stroke="#334155" stroke-width="3"/>
    <text y="20" font-size="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">🎓</text>
  </g>

  <!-- Main heading -->
  <text x="600" y="340" font-size="56" font-weight="800" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" fill="url(#textGrad)" letter-spacing="-1">
    Procvič si angličtinu
  </text>

  <!-- Subheading -->
  <text x="600" y="420" font-size="24" font-weight="400" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" fill="#94a3b8" letter-spacing="0.5">
    Interaktivní cvičení z angličtiny – online zdarma
  </text>

  <!-- Feature tags -->
  <g transform="translate(600, 500)">
    <!-- Tag 1 -->
    <g transform="translate(-250, 0)">
      <rect x="0" y="-20" width="140" height="40" rx="20" fill="rgba(99, 102, 241, 0.1)" stroke="rgba(99, 102, 241, 0.2)" stroke-width="1"/>
      <text x="70" y="6" font-size="14" font-weight="600" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" fill="#a5b4fc">Bez registrace</text>
    </g>
    <!-- Tag 2 -->
    <g transform="translate(-70, 0)">
      <rect x="0" y="-20" width="140" height="40" rx="20" fill="rgba(168, 85, 247, 0.1)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>
      <text x="70" y="6" font-size="14" font-weight="600" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" fill="#d8b4fe">100% Zdarma</text>
    </g>
    <!-- Tag 3 -->
    <g transform="translate(110, 0)">
      <rect x="0" y="-20" width="140" height="40" rx="20" fill="rgba(16, 185, 129, 0.1)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="1"/>
      <text x="70" y="6" font-size="14" font-weight="600" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" fill="#6ee7b7">Bez ukládání dat</text>
    </g>
  </g>
</svg>
